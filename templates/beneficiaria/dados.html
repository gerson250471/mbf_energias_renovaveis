<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <?!= include('multiuso/header'); ?>
  </head>
  <body>
    <div class='container-fluid'>
      <div class='row' style='height: 100vh;'>
        <div class='col-2'>
          <?!= include('multiuso/menu_lateral'); ?>
        </div>
        <div class='col-10'>
          
          <div class='row mt-3'>
            <h5>LISTA DE BENEFICIÁRIAS (UNIDADES CONSUMIDORAS)</h5>
          </div>
          
          <div class="row mt-3">
            <div class="col-2">
              <a href="https://script.google.com/macros/s/AKfycbyiKeZCPZmxifwCu7E8lFI1RXCiNSppXcRjG6_-W3jq/dev?page=templates/beneficiaria/form&uc=0">
                <button type="button" class="btn btn-success w-100"><i class="bi bi-plus-circle"></i>&nbsp;Novo</button>
              </a>
            </div>
            <div class="col-2">
              <button type="button" class="btn btn-success w-100" onclick="altera_beneficiaria()"><i class="bi bi-pencil"></i>&nbsp;Alterar</button>
            </div>
            <div class="col-2">
              <button type="button" class="btn btn-danger w-100" onclick="deleta_beneficiaria()"><i class="bi bi-trash"></i>&nbsp;Excluir</button>
            </div>
          </div>
          
          <div class="row mt-3">
            <div class="col" style="overflow-x: auto;"> <table class="table table-hover" id="table_beneficiaria" style="white-space: nowrap; font-size: 0.9em;">
                  <thead>
                    <tr>
                      <th scope="col">UC</th>
                      <th scope="col">CLIENTE</th>
                      <th scope="col">RT %</th>
                      <th scope="col">VENC</th>
                      <th scope="col">UG</th>
                      <th scope="col">REPASSE</th>
                      <th scope="col">% REPASS</th>
                      <th scope="col">UNIDADE</th>
                      <th scope="col">PROX LEIT</th>
                      <th scope="col">STATUS</th>
                      <th scope="col">QT MED</th>
                      <th scope="col">MED CONS</th>
                      <th scope="col">USINA</th>
                    </tr>
                  </thead>
                  <tbody>
                    </tbody>
                </table>
            </div>
          </div>
          
      </div>
    </div>
  </body>
  
  <script>
    $(document).ready(function(){
      gerar_tabela();
    });

    function alterar_visual_linha(tbody){
      var todas_tr = tbody.querySelectorAll("tr");
      todas_tr.forEach((item) => {
        item.classList.remove("table-dark");
      });
    }

    function gerar_tabela(){
      var table = document.getElementById("table_beneficiaria");
      var tbody = table.getElementsByTagName('tbody')[0]; 
      tbody.innerHTML = '<tr><td colspan="13" class="text-center">Carregando dados...</td></tr>';

      google.script.run.withSuccessHandler(function(retorno){
        var dados = typeof retorno === 'string' ? JSON.parse(retorno) : retorno;
        
        // Remove o cabeçalho
        dados = dados.slice(1); 
        tbody.innerHTML = '';

        dados.forEach((item) => {
          var tr = document.createElement('tr');
          tr.style.cursor = 'pointer'; 
          
          tr.onclick = (e) => {
            alterar_visual_linha(tbody);
            e.currentTarget.classList.add("table-dark");
          };

          // Loop para criar as 13 colunas baseadas na aba do Sheets
          for(var i = 0; i < 13; i++) {
            var td = document.createElement('td');
            td.innerHTML = item[i] || ''; 
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        });
        
      }).backend("ler_todas_beneficiarias"); 
    }

    function altera_beneficiaria(){
      var table = document.getElementById("table_beneficiaria");
      var tbody = table.getElementsByTagName('tbody')[0]; 
      var table_dark = tbody.querySelectorAll('.table-dark');
      
      if(table_dark.length === 0) {
        alert("Por favor, selecione uma beneficiária na tabela primeiro.");
        return;
      }
      
      // Pega a UC (Coluna 0)
      var uc = table_dark[0].getElementsByTagName('td')[0].innerHTML;
      
      var a = document.createElement('a');
      a.href = "https://script.google.com/macros/s/AKfycbyiKeZCPZmxifwCu7E8lFI1RXCiNSppXcRjG6_-W3jq/dev?page=templates/beneficiaria/form&uc=" + uc.toString();
      
      document.body.appendChild(a);
      a.click();
    }

    function deleta_beneficiaria() {
      var table = document.getElementById("table_beneficiaria");
      var tbody = table.getElementsByTagName('tbody')[0]; 
      var table_dark = tbody.querySelectorAll('.table-dark');
      
      if(table_dark.length === 0) {
        alert("Por favor, selecione uma beneficiária na tabela para excluir.");
        return;
      }
      
      var uc = table_dark[0].getElementsByTagName('td')[0].innerHTML;
      var nome = table_dark[0].getElementsByTagName('td')[1].innerHTML;
      
      if (confirm("ATENÇÃO: Deseja excluir permanentemente a Beneficiária " + nome + " (UC: " + uc + ")?")) {
        
        google.script.run
          .withSuccessHandler(function() {
            alert("Beneficiária excluída com sucesso!");
            gerar_tabela(); 
          })
          .withFailureHandler(function(erro) {
            alert("Erro ao excluir: " + erro.message);
          })
          .backend("excluir_beneficiaria", uc); 
      }
    }
  </script>
</html>
