<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <?!= include('multiuso/header'); ?>
  </head>
  <body>
    <div class='container-fluid'>
      <div class='row' style='height: 100vh;'>
        <div class='col-2'>
          <?!= include('multiuso/menu_lateral'); ?>
        </div>
        <div class='col-10'>
          <!-- Formulário para Inserir Informação -->
          <div class='row mt-3'>
            <h5>LISTA DE GERADORAS</h5>
          </div>
          <!-- botões -->
          <div class="row mt-3">
            <div class="col-2">
              <a href="https://script.google.com/macros/s/AKfycbyiKeZCPZmxifwCu7E8lFI1RXCiNSppXcRjG6_-W3jq/dev?page=templates/geradora/form&ug=0">
                <button type="button" class="btn btn-success w-100" onclick="salvar_geradora(obj_para_lancar)"><i class="bi bi-plus-circle"></i>&nbsp;Novo</button>
              </a>
            </div>
            <div class="col-2">
              <button type="button" class="btn btn-success w-100" onclick="altera_geradora()"><i class="bi bi-pencil"></i>&nbspAlterar</button>
            </div>
          </div>
          <div class="row">
            <div class="col">
                <table class="table" id="table_geradora">
                  <thead>
                    <tr>
                      <th scope="col">UG</th>
                      <th scope="col">UNIDADE GERADORA</th>
                      <th scope="col">MED GERAÇÃO</th>
                      <th scope="col">QUANT MÊS</th>
                      <th scope="col">LOGIN</th>
                      <th scope="col">SENHA</th>
                      <th scope="col">ACESSO</th>
                      <th scope="col">DETALHE</th>
                    </tr>
                  </thead>
                  <tbody>
                    
                  </tbody>
                </table>
            </div>
          </div>
      </div>
    </div>
  </body>
  <script>

    $(document).ready(function(){
      gerar_tabela()
    });

    function altera_geradora(obj_para_lancar){
      var table_geradora = document.getElementById("table_geradora")
      var tbody =table_geradora.getElementsByTagName('tbody')[0] 
      var table_dark = tbody.querySelectorAll('.table-dark')[0]
      var ug = table_dark.getElementsByTagName('td')[0].innerHTML
      
      var a = document.createElement('a')
      a.href = "https://script.google.com/macros/s/AKfycbyiKeZCPZmxifwCu7E8lFI1RXCiNSppXcRjG6_-W3jq/dev?page=templates/geradora/form&ug=" + ug.toString()
      
      document.getElementsByTagName('body')[0].appendChild(a)
      a.click()

    }

    function gerar_tabela(){
      google.script.run.withSuccessHandler(function(retorno){
        var dados = JSON.parse(retorno)
        dados = dados.slice(1,dados.lenght)
        var table_geradora = document.getElementById("table_geradora")
        var tbody =table_geradora.getElementsByTagName('tbody')[0] 

        dados.forEach((item)=>{
          var tr = document.createElement('tr')
          tr.onclick = (e) =>{
            limpa_click_na_tabela_geradora(tbody)
            var click_l = e.currentTarget
            click_l.classList.add("table-dark")
          }
          // ug
          var td = document.createElement('td')
          td.innerHTML = item[0]
          tr.appendChild(td)

          // unidade_geradora
          var td = document.createElement('td')
          td.innerHTML = item[1]
          tr.appendChild(td)

          // prod_med
          var td = document.createElement('td')
          td.innerHTML = item[2]
          tr.appendChild(td)

          // qt_mes
          var td = document.createElement('td')
          td.innerHTML = item[3]
          tr.appendChild(td)

          // login
          var td = document.createElement('td')
          td.innerHTML = item[4]
          tr.appendChild(td)

          // senha
          var td = document.createElement('td')
          td.innerHTML = item[5]
          tr.appendChild(td)

          // acesso
          var td = document.createElement('td')
          td.innerHTML = item[6]
          tr.appendChild(td)

          // detalhe
          var td = document.createElement('td')
          td.innerHTML = item[7]
          tr.appendChild(td)

          tbody.appendChild(tr)
        })
      }).backend("ler_todas_geradoras",)//Obter lista de Geradoras
    }

    function limpa_click_na_tabela_geradora(tbody){
      var todas_tr = tbody.querySelectorAll("tr")
      todas_tr.forEach((item)=>{
        item.classList.remove("table-dark")
      })
    }
  </script>
</html>
