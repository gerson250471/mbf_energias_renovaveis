  <script>

    $(document).ready(function(){
      beneficiaria_tabela()

  function altera_beneficiaria() {
    const selecionado = document.querySelector("#table_geradora tbody tr.table-dark");
    
    if (!selecionado) {
      alert("Por favor, selecione uma beneficiária na tabela primeiro.");
      return;
    }

    const uc = selecionado.getElementsByTagName('td')[0].innerHTML;
    
    // Busca a URL do script que o Google injeta automaticamente
    google.script.run.withSuccessHandler(function(url) {
      window.open(url + "?page=templates/geradora/form&uc=" + uc, "_top");
    }).getScriptUrl(); // Você precisará criar essa função simples no backend
  }

    function beneficiaria_tabela() {
  // Adicione um spinner ou mensagem de carregamento aqui se desejar
  google.script.run.withSuccessHandler(function(retorno) {
    const dados = JSON.parse(retorno);
    const corpoTabela = document.querySelector("#table_geradora tbody");
    corpoTabela.innerHTML = ""; // Limpa a tabela antes de renderizar

    // Remove o cabeçalho se ele vier no array
    const linhas = dados.slice(1);

    linhas.forEach((item) => {
      const tr = document.createElement('tr');
      tr.style.cursor = "pointer";
      
      // Lógica de seleção
      tr.onclick = (e) => {
        document.querySelectorAll("#table_geradora tbody tr").forEach(r => r.classList.remove("table-dark"));
        e.currentTarget.classList.add("table-dark");
      };

      // Injeção rápida de colunas usando Map e Join
      // Isso substitui as 50 linhas de appendChild
      tr.innerHTML = item.map(coluna => `<td>${coluna || '-'}</td>`).join('');
      
      corpoTabela.appendChild(tr);
    });
  }).backend("ler_todas_beneficiarias");
}

    function limpa_click_na_tabela_beneficiaria(tbody){
      var todas_tr = tbody.querySelectorAll("tr")
      todas_tr.forEach((item)=>{
        item.classList.remove("table-dark")
      })
    }
  </script>
