<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <?!= include('multiuso/header'); ?>
  </head>
  <body>
    <div class='container-fluid'>
      <div class='row' style='height: 100vh;'>
        <div class='col-2'>
          <?!= include('multiuso/menu_lateral'); ?>
        </div>
        <div class='col-10'>
          <!-- Formulário para Inserir Informação -->
          <div class='row mt-3'>
            <h5>LISTA DE GERADORAS</h5>
          </div>
          <!-- botões -->
          <div class="row mt-3">
           <div class="col-2">
              <a href="https://script.google.com/macros/s/AKfycbyiKeZCPZmxifwCu7E8lFI1RXCiNSppXcRjG6_-W3jq/dev?page=templates/geradora/form&ug=0">
                <button type="button" class="btn btn-success w-100"><i class="bi bi-plus-circle"></i>&nbsp;Novo</button>
              </a>
            </div>
            <div class="col-2">
              <button type="button" class="btn btn-success w-100" onclick="altera_geradora()"><i class="bi bi-pencil"></i>&nbsp;Alterar</button>
            </div>
            <div class="col-2">
              <button type="button" class="btn btn-danger w-100" onclick="deleta_geradora()"><i class="bi bi-trash"></i>&nbsp;Excluir</button>
            </div>
          </div>
          <div class="row">
            <div class="col">
                <table class="table" id="table_geradora">
                  <thead>
                    <tr>
                      <th scope="col">UG</th>
                      <th scope="col">UNIDADE GERADORA</th>
                      <th scope="col">MED GERAÇÃO</th>
                      <th scope="col">QUANT MÊS</th>
                      <th scope="col">LOGIN</th>
                      <th scope="col">SENHA</th>
                      <th scope="col">ACESSO</th>
                      <th scope="col">DETALHE</th>
                    </tr>
                  </thead>
                  <tbody>
                    
                  </tbody>
                </table>
            </div>
          </div>
      </div>
    </div>
  </body>
  <script>
    $(document).ready(function(){
      gerar_tabela();
    });

    function altera_geradora(obj_para_lancar){
      var table_geradora = document.getElementById("table_geradora");
      var tbody = table_geradora.getElementsByTagName('tbody')[0]; 
      
      // Proteção: Verifica se tem alguma linha selecionada (evita erro se clicar antes de selecionar)
      var table_dark = tbody.querySelectorAll('.table-dark');
      if(table_dark.length === 0) {
        alert("Por favor, selecione uma geradora na tabela primeiro.");
        return;
      }
      
      var ug = table_dark[0].getElementsByTagName('td')[0].innerHTML;
      
      var a = document.createElement('a');
      a.href = "https://script.google.com/macros/s/AKfycbyiKeZCPZmxifwCu7E8lFI1RXCiNSppXcRjG6_-W3jq/dev?page=templates/geradora/form&ug=" + ug.toString();
      
      document.body.appendChild(a);
      a.click();
    }

    function gerar_tabela(){
      google.script.run.withSuccessHandler(function(retorno){
        
        // Verifica se o retorno veio como String (precisa de parse) ou se já veio como Array
        var dados = typeof retorno === 'string' ? JSON.parse(retorno) : retorno;
        
        // Remove a linha do cabeçalho (agora escrito corretamente)
        dados = dados.slice(1); 
        
        var table_geradora = document.getElementById("table_geradora");
        var tbody = table_geradora.getElementsByTagName('tbody')[0]; 
        
        // Limpa a tabela antes de preencher (previne dados duplicados se recarregar)
        tbody.innerHTML = '';

        dados.forEach((item) => {
          var tr = document.createElement('tr');
          tr.style.cursor = 'pointer'; // Dá um feedback visual de que a linha é clicável
          
          tr.onclick = (e) => {
            limpa_click_na_tabela_geradora(tbody);
            e.currentTarget.classList.add("table-dark");
          };

          // Loop para criar as 8 colunas (TDs) baseadas nos itens do array
          for(var i = 0; i < 8; i++) {
            var td = document.createElement('td');
            td.innerHTML = item[i] || ''; // O "|| ''" evita aparecer "undefined" se a célula do Sheets estiver em branco
            tr.appendChild(td);
          }

          tbody.appendChild(tr);
        });
        
      // ATENÇÃO: Se você realmente tem uma função no .gs chamada "backend", mude a linha abaixo para .backend("ler_todas_geradoras")
      }).backend('ler_todas_geradoras', ); 
    }

    function limpa_click_na_tabela_geradora(tbody){
      var todas_tr = tbody.querySelectorAll("tr");
      todas_tr.forEach((item) => {
        item.classList.remove("table-dark");
      });
    }

    function deleta_geradora() {
      var table_geradora = document.getElementById("table_geradora");
      var tbody = table_geradora.getElementsByTagName('tbody')[0]; 
      var table_dark = tbody.querySelectorAll('.table-dark');
      
      // Verifica se o usuário selecionou alguma linha
      if(table_dark.length === 0) {
        alert("Por favor, selecione uma geradora na tabela para excluir.");
        return;
      }
      
      // Captura o UG da linha selecionada
      var ug = table_dark[0].getElementsByTagName('td')[0].innerHTML;
      
      // Pede confirmação (Proteção contra cliques acidentais)
      if (confirm("Tem certeza que deseja excluir a geradora UG " + ug + "? Essa ação não pode ser desfeita e removerá a linha da planilha.")) {
        
        google.script.run
          .withSuccessHandler(function() {
            alert("Geradora excluída com sucesso!");
            gerar_tabela(); // Recarrega a tabela automaticamente para sumir com a linha deletada
          })
          .withFailureHandler(function(erro) {
            alert("Erro ao excluir: " + erro.message);
          })
          .backend("excluir_geradora", ug); // Chama a função nova no .gs
      }
    }

  </script>
</html>
