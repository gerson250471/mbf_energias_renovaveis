<!doctype html>
<html>
  <head>
    <base target="_top" />
    <?!= include('multiuso/header'); ?>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row" style="height: 100vh">
        <div class="col-2"><?!= include('multiuso/menu_lateral'); ?></div>
        <div class="col-10" id="form_geradora">
          <!-- Formulário para Inserir Informação -->
          <div class="row mt-3">
            <h5>UNIDADE DE GERAÇÃO</h5>
          </div>
          <div class="row">
            <!-- UG -->
            <div class="col-2">
              <label class="form-label">UG</label>
              <input type="number" name="ug" class="form-control myInput" />
            </div>
            <!-- DESCRIÇÃO UG -->
            <div class="col-6">
              <label class="form-label">UNIDADE GERADORA</label>
              <input
                type="text"
                name="unidade_geradora"
                class="form-control myInput"
              />
            </div>
            <!-- PRODUÇÃO MÉDIA -->
            <div class="col-2">
              <label class="form-label">MÉDIA</label>
              <input
                type="number"
                name="prod_med"
                class="form-control myInput"
              />
            </div>
            <!-- QUANTIDADE DE MÊS PARA MÉDIA -->
            <div class="col-1">
              <label class="form-label">QT MÊS</label>
              <input type="number" name="qt_mes" class="form-control myInput" />
            </div>
            <!-- NOVA LINHA -->
            <div class="row">
              <!-- LOGIN -->
              <div class="col-3">
                <label class="form-label">LOGIN</label>
                <input type="text" name="login" class="form-control myInput" />
              </div>
              <!-- SENHA -->
              <div class="col-3">
                <label class="form-label">SENHA</label>
                <input type="text" name="senha" class="form-control myInput" />
              </div>
              <!-- ACESSO -->
              <div class="col-2">
                <label class="form-label">ACESSO</label>
                <input type="text" name="acesso" class="form-control myInput" />
              </div>
              <!-- DETALHE -->
              <div class="col-2">
                <label class="form-label">DETALHE</label>
                <input
                  type="text"
                  name="detalhe"
                  class="form-control myInput"
                />
              </div>
              <!-- BOTÕES -->
              <div class="row mt-3">
                <div class="col-2">
                  <a
                    href="https://script.google.com/macros/s/AKfycbyiKeZCPZmxifwCu7E8lFI1RXCiNSppXcRjG6_-W3jq/dev?page=templates/geradora/dados"
                  >
                    <button type="button" class="btn btn-danger w-100">
                      Cancelar
                    </button>
                  </a>
                </div>
                <div class="col-2">
                  <button
                    type="button"
                    class="btn btn-success w-100"
                    onclick="salvar_geradora()"
                  >
                    Salvar
                  </button>
                </div>
              </div>
              <div class="row mt-3">
                <div class="col-4">
                  <div
                    class="alert alert-success"
                    role="alert"
                    id="meu_alert"
                    style="display: none"
                  >
                    Geradora Salva com Sucesso !
                  </div>
                </div>
              </div>
              <script>
                $(document).ready(function () {
                  // Captura o UG dinâmico do Apps Script
                  var ug_atual = "<?= ug; ?>";

                  // Se não for "0", significa que é edição
                  if (ug_atual != "0" && ug_atual != "") {
                    // 1. Captura o formulário e os campos pela sua lógica
                    var form = document.getElementById("form_geradora");
                    var inputs = form.querySelectorAll(".myInput");

                    // Desativa os campos enquanto busca os dados
                    inputs.forEach((i) => (i.disabled = true));

                    google.script.run
                      .withSuccessHandler(function (retorno) {
                        var dados =
                          typeof retorno === "string"
                            ? JSON.parse(retorno)
                            : retorno;

                        if (dados) {
                          // 2. O LOOP DE PREENCHIMENTO: Preenche cada input com o índice correspondente do array
                          for (var i = 0; i < inputs.length; i++) {
                            inputs[i].value = dados[i] || "";
                          }
                        }

                        // Libera os campos novamente
                        inputs.forEach((i) => (i.disabled = false));

                        // Trava apenas o primeiro campo (que deve ser o UG) para proteger a chave
                        if (inputs.length > 0) {
                          inputs[0].disabled = true;
                        }
                      })
                      .backend("ler_geradora_especifica", ug_atual);
                  }
                });

                function salvar_geradora() {
                  var form = document.getElementById("form_geradora");
                  var inputs = form.querySelectorAll(".myInput");
                  var obj_para_lancar = {};

                  // Loop para montar o objeto para o backend
                  inputs.forEach(function (input) {
                    if (input.id) {
                      obj_para_lancar[input.id] = input.value;
                    }
                  });

                  // Força a leitura do UG, pois campos desativados (disabled) às vezes vêm vazios
                  if (inputs.length > 0) {
                    obj_para_lancar[inputs[0].id] = inputs[0].value;
                  }

                  var btnSalvar = document.getElementById("btn_salvar");
                  if (btnSalvar) btnSalvar.disabled = true;

                  google.script.run
                    .withSuccessHandler(function (retorno) {
                      document.getElementById("meu_alert").style.display =
                        "block";

                      setTimeout(function () {
                        window.location.href =
                          "https://script.google.com/macros/s/AKfycbyiKeZCPZmxifwCu7E8lFI1RXCiNSppXcRjG6_-W3jq/dev?page=templates/geradora/dados";
                      }, 1500);
                    })
                    .withFailureHandler(function (erro) {
                      alert("Erro ao salvar: " + erro.message);
                      if (btnSalvar) btnSalvar.disabled = false;
                    })
                    .backend("salvar_geradora", obj_para_lancar);
                }
              </script>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
